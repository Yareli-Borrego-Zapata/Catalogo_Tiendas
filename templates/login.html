<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso Comerciantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow p-4" style="max-width: 400px; width: 100%;">
        <h3 class="fw-bold text-center mb-3">Portal Vendedores</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }} p-2 small text-center">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Correo Electrónico:</label>
                <input type="email" name="correo" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña:</label>
                <input type="password" name="contrasena" class="form-control" required>
            </div>
            <div class="row g-2">
                <div class="col-6">
                    <button type="submit" name="accion" value="login" class="btn btn-primary w-100 fw-bold">Ingresar</button>
                </div>
                <div class="col-6">
                    <button type="submit" name="accion" value="registro" class="btn btn-outline-secondary w-100 fw-bold">Registrarme</button>
                </div>
            </div>
        </form>
        <a href="/" class="text-center d-block mt-3 text-muted small">Volver al inicio</a>
    </div>
</body>
</html>
