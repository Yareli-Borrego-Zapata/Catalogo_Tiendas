<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogos Juárez</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-primary min-vh-100 d-flex flex-column justify-content-center align-items-center py-5">

    <div class="text-center text-white mb-4">
        <div class="bg-white bg-opacity-25 rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
             style="width:80px; height:80px;">
            <i class="bi bi-geo-alt-fill" style="font-size:2.2rem;"></i>
        </div>
        <h1 class="fw-bold display-6 mb-1">Catálogos Juárez</h1>
        <p class="opacity-75 mb-0">Descubre y apoya el comercio local de tu colonia</p>
    </div>

    <div class="card border-0 shadow-lg p-2" style="max-width:440px; width:100%; border-radius:1.25rem;">
        <div class="card-body p-3">

            <p class="text-center text-muted small fw-semibold text-uppercase letter-spacing mb-3">
                ¿Cómo deseas ingresar?
            </p>

            <a href="/inicio" class="d-flex align-items-center gap-3 p-3 mb-2 rounded-3 text-decoration-none border border-2 border-primary text-primary">
                <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                     style="width:48px;height:48px;">
                    <i class="bi bi-people-fill fs-4"></i>
                </div>
                <div class="flex-grow-1">
                    <div class="fw-bold">Soy vecino / cliente</div>
                    <div class="small text-muted">Busca tiendas cerca de tu colonia</div>
                </div>
                <i class="bi bi-arrow-right-circle-fill fs-4 text-primary"></i>
            </a>

            <a href="/login" class="d-flex align-items-center gap-3 p-3 rounded-3 text-decoration-none border text-dark">
                <div class="bg-secondary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                     style="width:48px;height:48px;">
                    <i class="bi bi-shop fs-4 text-secondary"></i>
                </div>
                <div class="flex-grow-1">
                    <div class="fw-bold">Soy vendedor / comerciante</div>
                    <div class="small text-muted">Crea y gestiona tu catálogo digital</div>
                </div>
                <i class="bi bi-arrow-right-circle fs-4 text-secondary"></i>
            </a>

        </div>
    </div>

    <p class="text-white opacity-50 small mt-4 mb-0">
        <i class="bi bi-patch-check-fill me-1"></i>Plataforma gratuita para micro-comerciantes · Ciudad Juárez
    </p>

</body>
</html>
